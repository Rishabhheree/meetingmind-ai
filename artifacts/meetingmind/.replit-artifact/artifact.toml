kind = "web"
previewPath = "/"
title = "MeetingMind AI"
version = "1.0.0"
id = "artifacts/meetingmind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21645

[services.development]
run = "pnpm --filter @workspace/meetingmind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meetingmind", "run", "build" ]
publicDir = "artifacts/meetingmind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21645"
BASE_PATH = "/"
